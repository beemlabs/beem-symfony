version: 2
updates:
  - package-ecosystem: composer
    directory: '/'
    schedule:
      interval: weekly
      day: monday
    # Library package: widen constraints instead of bumping minimums
    versioning-strategy: widen
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore(deps)'
    groups:
      symfony:
        patterns:
          - 'symfony/*'
      doctrine:
        patterns:
          - 'doctrine/*'
      dev-dependencies:
        dependency-type: development
        patterns:
          - 'pestphp/*'
          - 'friendsofphp/*'
